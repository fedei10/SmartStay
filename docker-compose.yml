services:
  postgres:
    image: postgres:16-alpine
    container_name: geai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myapp
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  fastapi:
    build:
      context: ./backend
    container_name: geai_fastapi
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "mcp.liteapi.travel:216.150.1.1"
    ports:
      - "8002:8000"
    volumes:
      - ./backend:/app
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload

  frontend:
    build:
      context: ./frontend
    container_name: geai_frontend
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      BACKEND_INTERNAL_URL: http://fastapi:8000
      NEXT_PUBLIC_API_URL: http://localhost:8002
      NEXT_PUBLIC_APP_URL: http://localhost:3005
    depends_on:
      - fastapi
    ports:
      - "3005:3004"

  redis:
    image: redis:7-alpine
    container_name: geai_redis
    restart: unless-stopped
    profiles:
      - orchestration
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --appendonly
      - "yes"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: geai_elasticsearch
    restart: unless-stopped
    profiles:
      - orchestration
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
