services:
  postgres:
    image: postgres:16-alpine
    container_name: geai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myapp
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  fastapi:
    build:
      context: ./backend
    container_name: geai_fastapi
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "mcp.liteapi.travel:216.150.1.1"
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload

volumes:
  postgres_data:
